<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyAgent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: #0f0f23;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #16213e;
      --text-primary: #eee;
      --text-secondary: #aaa;
      --accent: #00d9ff;
      --success: #2ed573;
      --error: #ff4757;
      --warning: #ffa502;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* 头部 */
    .header {
      background: var(--bg-secondary);
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .logo h1 {
      font-size: 20px;
      color: var(--accent);
    }
    
    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--bg-tertiary);
      border-radius: 20px;
      font-size: 13px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--error);
    }
    
    .status-dot.connected { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .status-dot.connecting { background: var(--warning); animation: pulse 1s infinite; }
    
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    
    /* 主内容区 */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    
    /* 侧边栏 */
    .sidebar {
      width: 200px;
      background: var(--bg-secondary);
      padding: 20px 0;
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    
    .agent-list {
      list-style: none;
    }
    
    .agent-item {
      padding: 12px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.2s;
    }
    
    .agent-item:hover { background: rgba(255,255,255,0.05); }
    .agent-item.active { background: rgba(0,217,255,0.1); border-left: 3px solid var(--accent); }
    
    .agent-icon { font-size: 18px; }
    .agent-name { font-size: 14px; }
    
    /* 聊天区 */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    
    .message {
      max-width: 80%;
      margin-bottom: 15px;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
    }
    
    .message.user {
      background: var(--bg-tertiary);
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    
    .message.assistant {
      background: rgba(0,217,255,0.1);
      border-bottom-left-radius: 4px;
    }
    
    .message.error {
      background: rgba(255,71,87,0.2);
      color: var(--error);
    }
    
    .message-time {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 5px;
    }
    
    /* 输入区 */
    .input-area {
      padding: 15px 20px;
      background: var(--bg-secondary);
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    
    .input-row {
      display: flex;
      gap: 10px;
    }
    
    textarea {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-primary);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      resize: none;
      min-height: 50px;
      max-height: 150px;
    }
    
    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .btn-send {
      padding: 12px 24px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-send:hover { background: #00c4e6; transform: translateY(-1px); }
    .btn-send:disabled { background: #555; color: #888; cursor: not-allowed; transform: none; }
    
    /* 欢迎页 */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
    }
    
    .welcome h2 { font-size: 24px; margin-bottom: 10px; color: var(--text-primary); }
    .welcome p { font-size: 14px; }
    
    /* 工具栏 */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    
    .tool-btn {
      padding: 6px 12px;
      background: var(--bg-tertiary);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .tool-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tool-btn.active { background: rgba(0,217,255,0.2); border-color: var(--accent); color: var(--accent); }
    
    /* 设置面板 */
    .settings-panel {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 30px;
      min-width: 400px;
      z-index: 100;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    
    .settings-panel h2 { margin-bottom: 20px; }
    
    .setting-item {
      margin-bottom: 15px;
    }
    
    .setting-item label {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .setting-item input {
      width: 100%;
      padding: 10px;
      background: var(--bg-primary);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: var(--text-primary);
    }
    
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
    }
    
    /* 加载动画 */
    .loading {
      display: inline-flex;
      gap: 4px;
    }
    
    .loading span {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    
    .loading span:nth-child(1) { animation-delay: -0.32s; }
    .loading span:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <!-- 头部 -->
  <header class="header">
    <div class="logo">
      <h1>🤖 MyAgent</h1>
    </div>
    <div class="status-badge">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">未连接</span>
    </div>
  </header>
  
  <!-- 主内容 -->
  <main class="main">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <ul class="agent-list">
        <li class="agent-item active" data-agent="general">
          <span class="agent-icon">💬</span>
          <span class="agent-name">通用助手</span>
        </li>
        <li class="agent-item" data-agent="web_search">
          <span class="agent-icon">🔍</span>
          <span class="agent-name">网页搜索</span>
        </li>
        <li class="agent-item" data-agent="file_manager">
          <span class="agent-icon">📁</span>
          <span class="agent-name">文件管理</span>
        </li>
        <li class="agent-item" data-agent="code_assist">
          <span class="agent-icon">💻</span>
          <span class="agent-name">代码助手</span>
        </li>
      </ul>
    </aside>
    
    <!-- 聊天区 -->
    <section class="chat-area">
      <!-- 欢迎页 -->
      <div class="welcome" id="welcome">
        <h2>欢迎使用 MyAgent</h2>
        <p>在下方输入框中描述您的任务</p>
      </div>
      
      <!-- 消息列表 -->
      <div class="messages" id="messages" style="display: none;"></div>
      
      <!-- 输入区 -->
      <div class="input-area">
        <div class="toolbar">
          <button class="tool-btn" id="btnClear">🗑️ 清空</button>
        </div>
        <div class="input-row">
          <textarea id="inputMessage" placeholder="输入您的问题或任务..." rows="1"></textarea>
          <button class="btn-send" id="btnSend" disabled>发送</button>
        </div>
      </div>
    </section>
  </main>
  
  <!-- 设置面板 -->
  <div class="overlay" id="overlay"></div>
  <div class="settings-panel" id="settingsPanel">
    <h2>⚙️ 设置</h2>
    <div class="setting-item">
      <label>Hub 地址</label>
      <input type="text" id="settingHub" value="localhost" placeholder="localhost">
    </div>
    <div class="setting-item">
      <label>Hub 端口</label>
      <input type="number" id="settingPort" value="8765" placeholder="8765">
    </div>
    <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;">
      <button class="tool-btn" onclick="closeSettings()">取消</button>
      <button class="btn-send" onclick="saveSettings()">保存</button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
